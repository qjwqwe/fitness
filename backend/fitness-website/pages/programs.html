<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健身计划 - 健身为王</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff3b30',
            bggray: '#f5f5f0',
            textgray: '#666666',
          },
        },
      }
    }
  </script>
</head>
<body class="bg-bggray">
  <header class="header">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row md:items-center justify-between">
        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold">健身为王</h1>
          <button id="menu-toggle" class="md:hidden text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
        <nav id="main-nav" class="hidden md:flex flex-col md:flex-row gap-2 mt-4 md:mt-0">
          <a href="/index.html" class="nav-link">首页</a>
          <a href="/pages/daily.html" class="nav-link">每日训练</a>
          <a href="/pages/workouts.html" class="nav-link">训练库</a>
          <a href="/pages/challenges.html" class="nav-link">月度挑战</a>
          <a href="/pages/programs.html" class="nav-link">健身计划</a>
          <a href="/pages/about.html" class="nav-link">关于我们</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <h2 class="text-3xl font-bold mb-8 text-center">健身计划</h2>

    <div id="program-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <p class="text-center texttextgray col-span-full">加载中...</p>
    </div>
  </main>

  <footer class="footer bg-white">
    <div class="container mx-auto px-4">
      <p>&copy; 2026 健身为王. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    const fitnessPrograms = [
      {
        id: 'beginner-4week',
        name: '新手入门四周计划',
        description: '从零开始，循序渐进。帮助你养成锻炼习惯，建立基础体能，适合从未锻炼过的新手。',
        weeks: 4,
        difficulty: 'beginner',
        frequency: '每周3次',
        image: 'beginner'
      },
      {
        id: 'core-3week',
        name: '三周核心强化',
        description: '专注于腹部、腰部核心肌群训练，改善体态，增强核心力量，让你拥有更强大的中段。',
        weeks: 3,
        difficulty: 'intermediate',
        frequency: '每周4次',
        image: 'core'
      },
      {
        id: 'weightloss-6week',
        name: '六周减脂塑形',
        description: '结合有氧和力量训练，高效燃脂，塑造线条，帮助你在六周内打造更好的身材。',
        weeks: 6,
        difficulty: 'intermediate',
        frequency: '每周5次',
        image: 'weightloss'
      },
      {
        id: 'calisthenics-8week',
        name: '八周街头健身入门',
        description: '从基础开始学习街头健身动作，逐步掌握俯卧撑、引体向上等徒手健身技能。',
        weeks: 8,
        difficulty: 'advanced',
        frequency: '每周4次',
        image: 'calisthenics'
      }
    ];

    document.addEventListener('DOMContentLoaded', function() {
      renderPrograms();
    });

    function renderPrograms() {
      const container = document.getElementById('program-grid');
      let html = '';

      fitnessPrograms.forEach(program => {
        const svg = getProgramSvg(program.image);
        html += `
          <div class="card">
            <div class="flex flex-col md:flex-row md:items-center gap-6">
              <div class="md:w-1/3">
                ${svg}
              </div>
              <div class="md:w-2/3">
                <h3 class="text-2xl font-bold mb-3">${program.name}</h3>
                <p class="texttextgray mb-4">${program.description}</p>
                <div class="flex flex-wrap gap-2 mb-4">
                  <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">${program.weeks} 周</span>
                  <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">${getDifficultyText(program.difficulty)}</span>
                  <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">${program.frequency}</span>
                </div>
                <a href="#" class="btn">开始计划</a>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function getDifficultyText(difficulty) {
      switch(difficulty) {
        case 'beginner': return '初级';
        case 'intermediate': return '中级';
        case 'advanced': return '高级';
        default: return '初级';
      }
    }

    function getProgramSvg(type) {
      const baseClass = 'svg-illustration w-32 h-32 mx-auto';
      switch(type) {
        case 'beginner':
          return `
            <svg class="${baseClass}" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40"/>
              <line x1="50" y1="20" x2="50" y2="40"/>
              <line x1="35" y1="30" x2="65" y2="30"/>
              <line x1="50" y1="40" x2="30" y2="60"/>
              <line x1="50" y1="40" x2="70" y2="60"/>
            </svg>
          `;
        case 'core':
          return `
            <svg class="${baseClass}" viewBox="0 0 100 100">
              <ellipse cx="50" cy="50" rx="30" ry="40"/>
              <line x1="30" y1="40" x2="70" y2="40"/>
              <line x1="30" y1="60" x2="70" y2="60"/>
            </svg>
          `;
        case 'weightloss':
          return `
            <svg class="${baseClass}" viewBox="0 0 100 100">
              <circle cx="30" cy="30" r="20"/>
              <circle cx="70" cy="70" r="20"/>
              <line x1="45" y1="45" x2="55" y2="55" stroke-width="4"/>
            </svg>
          `;
        case 'calisthenics':
          return `
            <svg class="${baseClass}" viewBox="0 0 100 100">
              <line x1="50" y1="10" x2="50" y2="90"/>
              <circle cx="30" cy="30" r="8"/>
              <circle cx="70" cy="30" r="8"/>
              <circle cx="30" cy="70" r="8"/>
              <circle cx="70" cy="70" r="8"/>
              <line x1="30" y1="30" x2="70" y2="30"/>
              <line x1="30" y1="70" x2="70" y2="70"/>
            </svg>
          `;
        default:
          return `
            <svg class="${baseClass}" viewBox="0 0 100 100">
              <rect x="20" y="20" width="60" height="60" rx="5"/>
            </svg>
          `;
      }
    }
  </script>
</body>
</html>
