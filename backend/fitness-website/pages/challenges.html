<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度挑战 - 健身为王</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff3b30',
            bggray: '#f5f5f0',
            textgray: '#666666',
          },
        },
      }
    }
  </script>
</head>
<body class="bg-bggray">
  <header class="header">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row md:items-center justify-between">
        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold">健身为王</h1>
          <button id="menu-toggle" class="md:hidden text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
        <nav id="main-nav" class="hidden md:flex flex-col md:flex-row gap-2 mt-4 md:mt-0">
          <a href="/index.html" class="nav-link">首页</a>
          <a href="/pages/daily.html" class="nav-link">每日训练</a>
          <a href="/pages/workouts.html" class="nav-link">训练库</a>
          <a href="/pages/challenges.html" class="nav-link">月度挑战</a>
          <a href="/pages/programs.html" class="nav-link">健身计划</a>
          <a href="/pages/about.html" class="nav-link">关于我们</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <!-- Current Challenge -->
    <div class="card mb-8">
      <h2 class="text-3xl font-bold mb-4 text-primary text-center">当前挑战</h2>
      <div id="current-challenge">
        <p class="text-center texttextgray">加载中...</p>
      </div>
    </div>

    <!-- Challenge Calendar -->
    <div class="card mb-8">
      <h3 class="text-2xl font-bold mb-4">挑战日历</h3>
      <div id="challenge-calendar" class="grid grid-cols-7 gap-2">
        <!-- Calendar will be rendered by JavaScript -->
        <p class="text-center texttextgray col-span-full">加载中...</p>
      </div>
    </div>

    <!-- Past Challenges -->
    <div class="card">
      <h3 class="text-2xl font-bold mb-4">历史挑战</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="p-4 bg-gray-50 rounded-lg">
          <h4 class="font-bold text-lg mb-2">三月 30天深蹲挑战</h4>
          <p class="texttextgray text-sm mb-3">从零开始，每天深蹲，打造完美腿部和臀部线条。</p>
          <span class="text-xs px-2 py-1 bg-gray-200 rounded">已完成</span>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <h4 class="font-bold text-lg mb-2">二月 30天平板支撑挑战</h4>
          <p class="texttextgray text-sm mb-3">从10秒到3分钟，强化核心，改善体态。</p>
          <span class="text-xs px-2 py-1 bg-gray-200 rounded">已完成</span>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <h4 class="font-bold text-lg mb-2">一月 21天拉伸习惯养成</h4>
          <p class="texttextgray text-sm mb-3">每日拉伸，增加柔韧性，缓解疲劳，改善睡眠。</p>
          <span class="text-xs px-2 py-1 bg-gray-200 rounded">已完成</span>
        </div>
        <div class="p-4 bg-gray-50 rounded-lg">
          <h4 class="font-bold text-lg mb-2">去年十二月 10分钟每日训练</h4>
          <p class="texttextgray text-sm mb-3">繁忙生活也不要忘记运动，每天只需10分钟保持习惯。</p>
          <span class="text-xs px-2 py-1 bg-gray-200 rounded">已完成</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer bg-white">
    <div class="container mx-auto px-4">
      <p>&copy; 2026 健身为王. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    // April 2026 30-day Push-up Challenge
    const currentChallenge = {
      name: '四月 30天俯卧撑挑战',
      description: '从轻松开始，每天逐渐增加俯卧撑数量，30天后你会惊讶于自己的进步！适合所有水平，新手可以做跪姿俯卧撑。',
      difficulty: 'Beginner',
      days: [
        { day: 1, target: 5, completed: false },
        { day: 2, target: 7, completed: false },
        { day: 3, target: 8, completed: false },
        { day: 4, target: 10, completed: false },
        { day: 5, target: 8, completed: false }, // rest day
        { day: 6, target: 12, completed: false },
        { day: 7, target: 14, completed: false },
        { day: 8, target: 16, completed: false },
        { day: 9, target: 18, completed: false },
        { day: 10, target: 10, completed: false }, // rest day
        { day: 11, target: 20, completed: false },
        { day: 12, target: 22, completed: false },
        { day: 13, target: 24, completed: false },
        { day: 14, target: 26, completed: false },
        { day: 15, target: 15, completed: false }, // rest day
        { day: 16, target: 28, completed: false },
        { day: 17, target: 30, completed: false },
        { day: 18, target: 32, completed: false },
        { day: 19, target: 35, completed: false },
        { day: 20, target: 20, completed: false }, // rest day
        { day: 21, target: 38, completed: false },
        { day: 22, target: 40, completed: false },
        { day: 23, target: 42, completed: false },
        { day: 24, target: 45, completed: false },
        { day: 25, target: 25, completed: false }, // rest day
        { day: 26, target: 48, completed: false },
        { day: 27, target: 50, completed: false },
        { day: 28, target: 52, completed: false },
        { day: 29, target: 55, completed: false },
        { day: 30, target: 60, completed: false }
      ]
    };

    document.addEventListener('DOMContentLoaded', function() {
      // Render current challenge info
      const challengeContainer = document.getElementById('current-challenge');
      challengeContainer.innerHTML = `
        <div class="text-center mb-6">
          <div class="mb-4">
            <svg class="svg-illustration w-32 h-32 mx-auto" viewBox="0 0 100 100">
              <rect x="20" y="15" width="60" height="70" rx="5"/>
              <rect x="25" y="20" width="50" height="15" rx="2"/>
              <line x1="25" y1="45" x2="75" y2="45"/>
              <line x1="25" y1="55" x2="75" y2="55"/>
              <line x1="25" y1="65" x2="75" y2="65"/>
              <circle cx="35" cy="50" r="3" fill="#ff3b30"/>
            </svg>
          </div>
          <h3 class="text-2xl font-bold mb-2">${currentChallenge.name}</h3>
          <p class="texttextgray mb-4">${currentChallenge.description}</p>
          <div class="flex justify-center gap-4 mb-4">
            <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">30 天</span>
            <span class="px-3 py-1 bg-gray-100 rounded-full text-sm">初级</span>
          </div>
        </div>
      `;

      // Render challenge calendar
      renderCalendar();
      
      // Add click handler for day toggling
      document.getElementById('challenge-calendar').addEventListener('click', function(e) {
        if (e.target.closest('.day-cell')) {
          const cell = e.target.closest('.day-cell');
          const dayIndex = parseInt(cell.dataset.day);
          currentChallenge.days[dayIndex].completed = !currentChallenge.days[dayIndex].completed;
          renderCalendar();
        }
      });
    });

    function renderCalendar() {
      const calendarContainer = document.getElementById('challenge-calendar');
      
      // Day headers
      let html = `
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">日</div>
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">一</div>
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">二</div>
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">三</div>
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">四</div>
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">五</div>
        <div class="col-span-1 text-center font-bold p-2 bg-gray-100 rounded">六</div>
      `;

      // Add empty cells for April 1 (which is on a Wednesday - 3 empty days)
      for (let i = 0; i < 2; i++) {
        html += '<div class="col-span-1"></div>';
      }

      // Add days
      currentChallenge.days.forEach((day, index) => {
        const completed = day.completed;
        const isRestDay = day.target <= 15 && day.target < day.target + 5; // Simple check for rest days
        html += `
          <div class="day-cell p-3 ${completed ? 'bg-primary text-white' : isRestDay ? 'bg-yellow-100' : 'bg-gray-50'} border rounded-lg cursor-pointer text-center transition-colors" data-day="${index}">
            <div class="font-bold">${day.day}</div>
            <div class="text-sm ${completed ? 'text-white' : 'texttextgray'}">${day.target} 个</div>
          </div>
        `;
      });

      calendarContainer.innerHTML = html;
    }
  </script>
</body>
</html>
