<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f8f9fa" rx="8"/>
  <!-- Simplified fitness illustration -->
  <g transform="translate(100, 50)">
    <!-- Person silhouette -->
    <ellipse cx="150" cy="40" rx="30" ry="30" fill="#2ecc71" opacity="0.8"/>
    <rect x="140" y="70" width="20" height="80" fill="#2ecc71" opacity="0.8" rx="4"/>
    <!-- Arms -->
    <rect x="100" y="80" width="40" height="15" fill="#2ecc71" opacity="0.8" rx="7" transform="rotate(-15 100 80)"/>
    <rect x="160" y="80" width="40" height="15" fill="#2ecc71" opacity="0.8" rx="7" transform="rotate(15 200 80)"/>
    <!-- Legs -->
    <rect x="125" y="150" width="18" height="60" fill="#2ecc71" opacity="0.8" rx="4"/>
    <rect x="157" y="150" width="18" height="60" fill="#2ecc71" opacity="0.8" rx="4"/>
  </g>
  <!-- Dumbbell -->
  <g transform="translate(350, 120)">
    <rect x="-80" y="-8" width="160" height="16" fill="#34495e" rx="4"/>
    <rect x="-75" y="-20" width="20" height="40" fill="#34495e" rx="4"/>
    <rect x="55" y="-20" width="20" height="40" fill="#34495e" rx="4"/>
  </g>
  <!-- Text placeholder -->
  <text x="300" y="260" text-anchor="middle" fill="#95a5a6" font-size="24" font-family="Arial">健身为王</text>
</svg>